<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Cloud Game - World</title>
  <link rel="stylesheet" href="/game.css">
</head>
<body>
<!-- UI Elements -->
<div id="ui-overlay">
  <p id="user-info">Loading user...</p>
  <!-- NEW: Match Timer -->
  <div id="match-timer">Match Time: --:--</div>
  <!-- END NEW -->
</div>
<button id="logout-button">Logout</button>

<!-- Instructions for Pointer Lock -->
<div id="instructions">
  <div>Click to play</div>
  <div>W, A, S, D / Arrows: Move</div>
  <div>SPACE: Up</div>
  <div>SHIFT / C: Down</div>
  <div>ESC: Release mouse</div>
  <div>ENTER: Toggle Chat</div>
  <!-- NEW: Scoreboard Instruction -->
  <div>TAB: Show/Hide Scoreboard</div>
  <!-- END NEW -->
</div>

<!-- Canvas for Three.js -->
<div id="game-container"></div>

<!-- Chat UI Elements -->
<div id="chat-container">
  <div id="chat-output"></div>
  <input type="text" id="chat-input" placeholder="Press Enter to chat..." style="display: none;">
</div>

<!-- Crosshair -->
<div id ="crosshair"></div>

<!-- NEW: Health Display (Added here instead of dynamically) -->
<div id="health-display">Health: 100</div>
<!-- END NEW -->

<!-- NEW: Scoreboard -->
<div id="scoreboard" style="display: none;">
  <h2>Scoreboard</h2>
  <table id="scoreboard-table">
    <thead>
    <tr>
      <th>Player</th>
      <th>Kills</th>
    </tr>
    </thead>
    <tbody>
    <!-- Score rows will be added here -->
    </tbody>
  </table>
  <div id="scoreboard-message" style="margin-top: 10px; font-style: italic;"></div>
</div>
<!-- END NEW -->

<!-- Include Three.js as an ES Module -->
<script type="importmap">
  {
      "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
  }
</script>

<!-- Load the main game logic -->
<script type="module" src="/js/bundle.js"></script>

</body>
</html>
