    # --- REMOVED HTTP (Port 80) to HTTPS (Port 443) Redirect Block ---
    # server {
    #     listen 80 default_server;
    #     listen [::]:80 default_server;
    #     server_name 192.168.0.37;
    #     return 301 https://$host$request_uri;
    # }
    # --- END REMOVED Redirect Block ---

    # --- NEW: HTTP Reverse Proxy Server Block (Port 80) ---
    # Handles insecure connections and forwards them to your Node.js app (now running HTTP)
    server {
        listen 80 default_server; # Listen on port 80 for the specified IP/domain
        listen [::]:80 default_server; # Listen on IPv6 as well

        # This should match how users access your server
        server_name 192.168.0.37; # Or your domain name if applicable

        # --- Logging (Optional but helpful) ---
        # access_log C:/nginx/logs/socialgame_http.access.log; # Example path
        # error_log C:/nginx/logs/socialgame_http.error.log;  # Example path

        # --- Reverse Proxy Logic ---
        location / {
            # --- Proxy to your Node.js app (running HTTP on port 3000) ---
            proxy_pass http://localhost:3000; # <-- CHANGE to http

            # --- Headers needed for the backend app ---
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; # $scheme will be 'http'

            # --- WebSocket Support (remains the same) ---
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
    # --- END NEW HTTP Block ---

    # include servers/*;

} # End of http block