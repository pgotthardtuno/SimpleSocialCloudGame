#user  nobody;
# Controls how many worker processes Nginx uses. 'auto' is often a good choice.
worker_processes  auto; # Changed to auto

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    # Max connections per worker process
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # --- COMMENTED OUT Default Server Block ---
    # This block was likely conflicting with your redirect block for port 80
    # If you don't need Nginx to serve default files on http://localhost,
    # it's best to remove or comment out this block.
    #
    # server {
    #     listen       80;
    #     server_name  localhost;
    #
    #     #charset koi8-r;
    #
    #     #access_log  logs/host.access.log  main;
    #
    #     location / {
    #         root   html; # Default Nginx welcome page directory
    #         index  index.html index.htm;
    #     }
    #
    #     #error_page  404              /404.html;
    #
    #     # redirect server error pages to the static page /50x.html
    #     #
    #     error_page   500 502 503 504  /50x.html;
    #     location = /50x.html {
    #         root   html;
    #     }
    # }
    # --- END OF COMMENTED OUT Default Server Block ---


    # --- HTTPS Reverse Proxy Server Block (Port 443) ---
    # Handles secure connections and forwards them to your Node.js app
    server {
        listen 443 ssl; # Added http2 for potential performance benefits
        listen [::]:443 ssl; # Listen on IPv6 as well

        # This should match how users access your server on the local network
        server_name 192.168.0.37; # Or socialgame.com if you set that up

        # --- SSL Configuration ---
        # Ensure these paths are correct for your system
        ssl_certificate         C:/Users/paulr/WebstormProjects/SocialCloudGame/localhost+3.pem;
        ssl_certificate_key     C:/Users/paulr/WebstormProjects/SocialCloudGame/localhost+3-key.pem;

        # --- Recommended SSL Settings ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        # Consider adding more security headers like Strict-Transport-Security if needed later
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # --- Logging (Optional but helpful) ---
        # Ensure the directory exists and Nginx has write permissions
        # access_log C:/nginx/logs/socialgame.access.log; # Example path for Windows
        # error_log C:/nginx/logs/socialgame.error.log;  # Example path for Windows

        # --- Reverse Proxy Logic ---
        location / {
            # --- Proxy to your Node.js app (running HTTPS on port 3000) ---
            proxy_pass https://localhost:3000;

            # --- Headers needed for the backend app ---
            proxy_set_header Host $host; # Pass the original host header
            proxy_set_header X-Real-IP $remote_addr; # Pass the real client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # List of IPs (proxy chain)
            proxy_set_header X-Forwarded-Proto $scheme; # Pass the original protocol (https)

            # --- WebSocket Support ---
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; # Allow connection upgrade
            proxy_set_header Connection "upgrade";  # Set header for upgrade
            proxy_read_timeout 86400s; # Increased timeout for long-lived connections (e.g., WebSockets)
            proxy_send_timeout 86400s;
        }
    }

    # --- HTTP (Port 80) to HTTPS (Port 443) Redirect Block ---
    # Catches insecure requests for your app's IP and redirects them
    server {
        listen 80 default_server; # Added default_server to make it explicit for this IP on port 80
        listen [::]:80 default_server; # Listen on IPv6 as well

        # Match the same server name as the HTTPS block
        server_name 192.168.0.37; # Or socialgame.com

        # Redirect all traffic permanently (301) to the HTTPS version
        return 301 https://$host$request_uri;
    }

    # include servers/*; # If you use separate server block files later

} # End of http block